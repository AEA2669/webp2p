<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work-Safe File Drop</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for direct browser-to-browser connection (Bypasses IT Bluetooth blocks) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .code-input { letter-spacing: 0.5em; text-align: center; font-size: 1.5rem; font-weight: bold; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 w-full max-w-md overflow-hidden flex flex-col h-[600px]">
        
        <!-- Header -->
        <div class="bg-emerald-600 p-6 text-white text-center shrink-0">
            <div class="flex justify-center mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">File Drop</h1>
            <p class="text-emerald-100 text-sm mt-1">Bypass IT blocks • Works on any network</p>
        </div>

        <div class="p-6 flex-1 flex flex-col space-y-6 overflow-y-auto">
            
            <!-- Connection Setup -->
            <div id="setupArea" class="space-y-6">
                
                <!-- Your Code -->
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 text-center">
                    <p class="text-sm font-semibold text-emerald-800 mb-1">Your Device Code</p>
                    <div class="flex justify-center items-center space-x-2">
                        <span id="myPin" class="text-4xl font-mono font-bold text-emerald-600 tracking-widest">----</span>
                    </div>
                    <p class="text-xs text-emerald-600 mt-2">Open this app on another device to connect.</p>
                </div>

                <!-- Connect to another -->
                <div class="text-center">
                    <p class="text-sm font-semibold text-slate-600 mb-2">Or connect to a friend's code:</p>
                    <input type="text" id="remotePin" maxlength="4" placeholder="0000" 
                        class="code-input w-48 mx-auto bg-white border-2 border-slate-300 rounded-lg px-4 py-3 text-slate-700 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition-all">
                    
                    <button id="connectBtn" class="mt-4 w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-semibold transition-colors flex justify-center items-center gap-2">
                        Connect Device
                    </button>
                    <p id="connectionStatus" class="text-sm font-medium text-center mt-3 h-4 text-slate-500"></p>
                </div>
            </div>

            <!-- Active Transfer Area (Hidden initially) -->
            <div id="transferArea" class="hidden flex-col h-full space-y-4">
                <div class="bg-emerald-100 text-emerald-800 px-4 py-2 rounded-lg text-sm font-semibold text-center flex items-center justify-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    Connected to Device <span id="connectedToPin"></span>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-center">
                    <input type="file" id="fileInput" class="hidden">
                    <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-6 hover:bg-slate-100 hover:border-emerald-400 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mx-auto text-slate-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        <span class="text-slate-600 font-medium block">Tap to select a file</span>
                        <span id="selectedFileName" class="text-xs text-emerald-600 block mt-1 font-semibold"></span>
                    </label>
                    <button id="sendFileBtn" disabled class="mt-3 w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white py-3 rounded-xl font-semibold transition-colors">
                        Send File
                    </button>
                    <p id="transferStatus" class="text-sm font-medium text-center mt-2 h-4 text-emerald-600"></p>
                </div>

                <!-- Received Files -->
                <div class="flex-1">
                    <h3 class="text-sm font-semibold text-slate-600 border-b border-slate-200 pb-2 mb-2">Received Files</h3>
                    <div id="downloads" class="space-y-2">
                        <p class="text-sm text-slate-400 italic" id="emptyDownloads">Waiting for files...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Generate a random 4-digit PIN for this device
        const myCode = Math.floor(1000 + Math.random() * 9000).toString();
        
        // PeerJS Setup (Using a custom prefix 'workdrop-' to avoid global collisions)
        const peer = new Peer('workdrop-' + myCode);
        let currentConnection = null;

        // UI Elements
        const myPinDisplay = document.getElementById('myPin');
        const remotePinInput = document.getElementById('remotePin');
        const connectBtn = document.getElementById('connectBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        
        const setupArea = document.getElementById('setupArea');
        const transferArea = document.getElementById('transferArea');
        const connectedToPin = document.getElementById('connectedToPin');
        
        const fileInput = document.getElementById('fileInput');
        const selectedFileName = document.getElementById('selectedFileName');
        const sendFileBtn = document.getElementById('sendFileBtn');
        const transferStatus = document.getElementById('transferStatus');
        const downloadsDiv = document.getElementById('downloads');
        const emptyDownloads = document.getElementById('emptyDownloads');

        // Allow only numbers in input
        remotePinInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // 1. Initialize our Peer
        peer.on('open', (id) => {
            myPinDisplay.innerText = myCode;
        });

        // 2. Listen for incoming connections
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // 3. Initiate a connection to another PIN
        connectBtn.addEventListener('click', () => {
            const remoteCode = remotePinInput.value;
            if (remoteCode.length !== 4) {
                connectionStatus.innerText = 'Please enter a 4-digit code.';
                connectionStatus.style.color = '#ef4444'; // Red
                return;
            }
            if (remoteCode === myCode) {
                connectionStatus.innerText = 'Cannot connect to yourself.';
                connectionStatus.style.color = '#ef4444';
                return;
            }

            connectionStatus.innerText = 'Searching for device...';
            connectionStatus.style.color = '#64748b'; // Slate
            
            const conn = peer.connect('workdrop-' + remoteCode);
            setupConnection(conn);
        });

        // 4. Handle the connection logic
        function setupConnection(conn) {
            currentConnection = conn;

            conn.on('open', () => {
                // Switch UI
                setupArea.classList.add('hidden');
                transferArea.classList.remove('hidden');
                transferArea.classList.add('flex');
                
                // Extract just the 4 digit code from the full ID
                connectedToPin.innerText = conn.peer.replace('workdrop-', '');
            });

            // Handle receiving data (files)
            conn.on('data', (data) => {
                if (data.file && data.filename) {
                    const blob = new Blob([data.file], { type: data.filetype });
                    const downloadUrl = URL.createObjectURL(blob);
                    
                    if (emptyDownloads) emptyDownloads.style.display = 'none';

                    // Create Download Button
                    const linkWrapper = document.createElement('div');
                    linkWrapper.className = 'bg-white p-3 rounded-lg border border-slate-200 flex justify-between items-center shadow-sm';
                    
                    const fileNameSpan = document.createElement('span');
                    fileNameSpan.className = 'text-sm font-medium text-slate-700 truncate max-w-[200px]';
                    fileNameSpan.innerText = data.filename;

                    const downloadLink = document.createElement('a');
                    downloadLink.href = downloadUrl;
                    downloadLink.download = data.filename;
                    downloadLink.className = 'bg-slate-800 hover:bg-slate-900 text-white px-4 py-1.5 rounded-md text-xs font-semibold transition-colors';
                    downloadLink.innerText = 'Save';

                    linkWrapper.appendChild(fileNameSpan);
                    linkWrapper.appendChild(downloadLink);
                    downloadsDiv.prepend(linkWrapper); // Add to top of list
                }
            });

            conn.on('close', resetUI);
            conn.on('error', resetUI);
        }

        function resetUI() {
            currentConnection = null;
            setupArea.classList.remove('hidden');
            transferArea.classList.add('hidden');
            transferArea.classList.remove('flex');
            connectionStatus.innerText = 'Connection disconnected.';
            connectionStatus.style.color = '#ef4444';
            setTimeout(() => { connectionStatus.innerText = ''; }, 3000);
        }

        // 5. Handle File Selection
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                selectedFileName.innerText = fileInput.files[0].name;
                sendFileBtn.disabled = false;
            } else {
                selectedFileName.innerText = '';
                sendFileBtn.disabled = true;
            }
        });

        // 6. Send the file
        sendFileBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file || !currentConnection) return;

            transferStatus.innerText = 'Sending... Please wait.';
            sendFileBtn.disabled = true;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                const arrayBuffer = event.target.result;
                
                try {
                    currentConnection.send({
                        file: arrayBuffer,
                        filename: file.name,
                        filetype: file.type
                    });
                    transferStatus.innerText = 'File sent successfully!';
                } catch (e) {
                    transferStatus.innerText = 'Failed to send file.';
                    transferStatus.style.color = '#ef4444';
                }
                
                setTimeout(() => {
                    transferStatus.innerText = '';
                    transferStatus.style.color = '#059669'; // Back to green
                    sendFileBtn.disabled = false;
                    fileInput.value = ''; // Reset input
                    selectedFileName.innerText = '';
                }, 3000);
            };
            
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
