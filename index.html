<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work-Safe File Drop - Premium</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for direct browser-to-browser connection -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Canvas Confetti for amazing success effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* Custom UI Enhancements */
        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #064e3b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .code-input { 
            letter-spacing: 0.5em; 
            text-align: center; 
            font-size: 1.75rem; 
            font-weight: 800; 
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        
        /* Drag and Drop Active State */
        .drag-active {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel rounded-3xl border border-white/20 w-full max-w-md overflow-hidden flex flex-col h-[650px] transition-all duration-500 relative">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-emerald-500 to-teal-600 p-6 text-white text-center shrink-0 relative overflow-hidden">
            <!-- Decorative background circles -->
            <div class="absolute top-0 left-0 w-32 h-32 bg-white opacity-10 rounded-full -translate-x-10 -translate-y-10"></div>
            <div class="absolute bottom-0 right-0 w-24 h-24 bg-white opacity-10 rounded-full translate-x-8 translate-y-8"></div>
            
            <div class="flex justify-center mb-2 relative z-10">
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-black tracking-tight relative z-10">FILE DROP</h1>
            <p class="text-emerald-50 text-sm font-medium relative z-10 mt-1 opacity-90">Lightning fast • Secure • Peer-to-Peer</p>
        </div>

        <div class="p-6 flex-1 flex flex-col space-y-6 overflow-y-auto">
            
            <!-- Connection Setup Area -->
            <div id="setupArea" class="space-y-6 animate-fade-in transition-all duration-500">
                
                <!-- Your Code -->
                <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 text-center shadow-inner">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Your Device Code</p>
                    <div class="flex justify-center items-center">
                        <span id="myPin" class="text-5xl font-mono font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-600 tracking-widest drop-shadow-sm">----</span>
                    </div>
                    <p class="text-xs text-slate-400 mt-3 font-medium">Open this app on another screen to connect.</p>
                </div>

                <!-- Connect to another -->
                <div class="text-center bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-sm font-bold text-slate-600 mb-3">Link to a device</p>
                    <input type="text" id="remotePin" maxlength="4" placeholder="0000" autocomplete="off"
                        class="code-input w-48 mx-auto bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/20 transition-all shadow-inner placeholder:text-slate-300">
                    
                    <button id="connectBtn" class="mt-4 w-full bg-slate-800 hover:bg-slate-900 text-white py-3.5 rounded-xl font-bold transition-all shadow-lg hover:shadow-xl active:scale-[0.98] flex justify-center items-center gap-2">
                        Connect Now
                    </button>
                    <p id="connectionStatus" class="text-sm font-semibold text-center mt-3 h-4 text-slate-500"></p>
                </div>
            </div>

            <!-- Active Transfer Area (Hidden initially) -->
            <div id="transferArea" class="hidden flex-col h-full space-y-4 transition-all duration-500">
                
                <!-- Status Bar -->
                <div class="flex justify-between items-center bg-emerald-50 text-emerald-800 px-4 py-3 rounded-xl text-sm font-bold border border-emerald-100">
                    <div class="flex items-center gap-2">
                        <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></div>
                        <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full absolute"></div>
                        <span>Linked: <span id="connectedToPin" class="font-black text-emerald-600"></span></span>
                    </div>
                    <button id="disconnectBtn" class="text-xs bg-emerald-200/50 hover:bg-emerald-200 text-emerald-700 px-3 py-1 rounded-md transition-colors">
                        Disconnect
                    </button>
                </div>

                <!-- Drag & Drop Upload Zone -->
                <div class="bg-slate-50 p-2 rounded-2xl border border-slate-200 text-center relative group">
                    <input type="file" id="fileInput" class="hidden">
                    
                    <label id="dropZone" for="fileInput" class="cursor-pointer block border-2 border-dashed border-slate-300 rounded-xl p-8 hover:bg-slate-100 hover:border-emerald-400 transition-all duration-300">
                        <div id="uploadIcon" class="transform group-hover:-translate-y-1 transition-transform duration-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mx-auto text-slate-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                        </div>
                        <span class="text-slate-700 font-bold text-lg block">Click or Drag File Here</span>
                        <span id="selectedFileName" class="text-sm text-emerald-600 block mt-2 font-semibold break-all"></span>
                    </label>
                    
                    <button id="sendFileBtn" disabled class="mt-3 w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 disabled:from-slate-300 disabled:to-slate-300 text-white py-3.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg disabled:shadow-none disabled:cursor-not-allowed">
                        Send File
                    </button>
                    <p id="transferStatus" class="text-sm font-bold text-center mt-3 h-4 text-emerald-600"></p>
                </div>

                <!-- Received Files List -->
                <div class="flex-1 bg-white rounded-2xl border border-slate-100 p-4 shadow-sm flex flex-col">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-3">Incoming Files</h3>
                    <div id="downloads" class="space-y-3 overflow-y-auto flex-1 pr-1">
                        <div class="flex flex-col items-center justify-center h-full opacity-50" id="emptyDownloads">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                            </svg>
                            <p class="text-sm font-medium text-slate-400">Waiting for files...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. System Initialization ---
        const myCode = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer('workdrop-v2-' + myCode); // Added v2 to prevent clashes with old versions
        let currentConnection = null;

        // UI Elements Map
        const UI = {
            myPin: document.getElementById('myPin'),
            remotePin: document.getElementById('remotePin'),
            connectBtn: document.getElementById('connectBtn'),
            status: document.getElementById('connectionStatus'),
            setupArea: document.getElementById('setupArea'),
            transferArea: document.getElementById('transferArea'),
            connectedPin: document.getElementById('connectedToPin'),
            disconnectBtn: document.getElementById('disconnectBtn'),
            fileInput: document.getElementById('fileInput'),
            dropZone: document.getElementById('dropZone'),
            selectedFile: document.getElementById('selectedFileName'),
            sendBtn: document.getElementById('sendFileBtn'),
            transferStatus: document.getElementById('transferStatus'),
            downloads: document.getElementById('downloads'),
            emptyDownloads: document.getElementById('emptyDownloads')
        };

        // --- 2. PeerJS Network Logic ---
        peer.on('open', () => {
            UI.myPin.innerText = myCode;
        });

        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // --- 3. Auto-Connect & Input Handling ---
        UI.remotePin.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, ''); // Numbers only
            
            // "Super Better" Feature: Auto-connect when 4 digits are typed!
            if (this.value.length === 4) {
                UI.connectBtn.click(); 
                this.blur(); // Hide keyboard on mobile
            }
        });

        UI.connectBtn.addEventListener('click', () => {
            const remoteCode = UI.remotePin.value;
            if (remoteCode.length !== 4) return flashStatus('Enter a 4-digit code.', '#ef4444');
            if (remoteCode === myCode) return flashStatus('Cannot connect to yourself.', '#ef4444');

            UI.status.innerText = 'Searching...';
            UI.status.style.color = '#64748b';
            
            const conn = peer.connect('workdrop-v2-' + remoteCode);
            setupConnection(conn);
        });

        UI.disconnectBtn.addEventListener('click', () => {
            if (currentConnection) currentConnection.close();
            resetUI();
        });

        // --- 4. Connection Lifecycle ---
        function setupConnection(conn) {
            currentConnection = conn;

            conn.on('open', () => {
                // Smooth UI Transition
                UI.setupArea.classList.add('hidden');
                UI.transferArea.classList.remove('hidden');
                UI.transferArea.classList.add('flex');
                UI.connectedPin.innerText = conn.peer.replace('workdrop-v2-', '');
                UI.remotePin.value = ''; // Reset for next time
                UI.status.innerText = '';
            });

            conn.on('data', (data) => {
                if (data.file && data.filename) {
                    receiveFile(data);
                }
            });

            conn.on('close', resetUI);
            conn.on('error', resetUI);
        }

        function resetUI() {
            currentConnection = null;
            UI.setupArea.classList.remove('hidden');
            UI.transferArea.classList.add('hidden');
            UI.transferArea.classList.remove('flex');
            flashStatus('Disconnected.', '#ef4444');
            
            // Reset file inputs
            UI.fileInput.value = '';
            UI.selectedFile.innerText = '';
            UI.sendBtn.disabled = true;
        }

        function flashStatus(msg, color) {
            UI.status.innerText = msg;
            UI.status.style.color = color;
            setTimeout(() => { UI.status.innerText = ''; }, 3000);
        }

        // --- 5. Drag & Drop and File Selection Logic ---
        
        // Handle regular click selection
        UI.fileInput.addEventListener('change', handleFileSelect);

        // Handle Drag and Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            UI.dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            UI.dropZone.addEventListener(eventName, () => {
                UI.dropZone.classList.add('drag-active');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            UI.dropZone.addEventListener(eventName, () => {
                UI.dropZone.classList.remove('drag-active');
            }, false);
        });

        UI.dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            if(files.length > 0) {
                UI.fileInput.files = files; // Assign dropped files to input
                handleFileSelect();
            }
        });

        function handleFileSelect() {
            if (UI.fileInput.files.length > 0) {
                UI.selectedFile.innerText = "📁 " + UI.fileInput.files[0].name;
                UI.sendBtn.disabled = false;
                UI.sendBtn.classList.add('animate-pulse'); // Pulse button to prompt action
                setTimeout(() => UI.sendBtn.classList.remove('animate-pulse'), 1000);
            } else {
                UI.selectedFile.innerText = '';
                UI.sendBtn.disabled = true;
            }
        }

        // --- 6. Sending & Receiving Files ---
        UI.sendBtn.addEventListener('click', () => {
            const file = UI.fileInput.files[0];
            if (!file || !currentConnection) return;

            UI.transferStatus.innerText = 'Sending...';
            UI.transferStatus.style.color = '#059669';
            UI.sendBtn.disabled = true;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    currentConnection.send({
                        file: event.target.result,
                        filename: file.name,
                        filetype: file.type
                    });
                    
                    UI.transferStatus.innerText = 'Sent successfully!';
                    fireConfetti(); // Celebrate!
                } catch (e) {
                    UI.transferStatus.innerText = 'Failed: File might be too large.';
                    UI.transferStatus.style.color = '#ef4444';
                }
                
                setTimeout(() => {
                    UI.transferStatus.innerText = '';
                    UI.sendBtn.disabled = false;
                    UI.fileInput.value = ''; 
                    UI.selectedFile.innerText = '';
                }, 3000);
            };
            
            reader.readAsArrayBuffer(file);
        });

        function receiveFile(data) {
            const blob = new Blob([data.file], { type: data.filetype });
            const downloadUrl = URL.createObjectURL(blob);
            
            if (UI.emptyDownloads) UI.emptyDownloads.style.display = 'none';

            // Create Premium Download Card
            const card = document.createElement('div');
            card.className = 'bg-slate-50 p-3 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm hover:shadow-md transition-shadow group';
            
            const fileInfo = document.createElement('div');
            fileInfo.className = 'flex items-center gap-3 overflow-hidden';
            fileInfo.innerHTML = `
                <div class="bg-indigo-100 text-indigo-600 p-2 rounded-lg shrink-0 group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
                <span class="text-sm font-bold text-slate-700 truncate pr-2">${data.filename}</span>
            `;

            const downloadLink = document.createElement('a');
            downloadLink.href = downloadUrl;
            downloadLink.download = data.filename;
            downloadLink.className = 'bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-bold transition-transform active:scale-95 shrink-0';
            downloadLink.innerText = 'Save';

            card.appendChild(fileInfo);
            card.appendChild(downloadLink);
            
            // Add to top of list with an animation
            card.classList.add('animate-fade-in');
            UI.downloads.prepend(card); 
            
            fireConfetti(); // Celebrate receiving a file!
        }

        // --- 7. Amazing Confetti Effect ---
        function fireConfetti() {
            var duration = 2 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#10b981', '#14b8a6', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#10b981', '#14b8a6', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
